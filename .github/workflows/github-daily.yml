name: GitHUB daily

on:
  schedule:
    - cron: '40 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Export report date
        id: report_date
        run: echo "date=$(date -u +%F)" >> $GITHUB_OUTPUT

      - name: Generate radar report
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python scripts/github_daily.py

      - name: Create issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: GitHUB daily - ${{ steps.report_date.outputs.date }}
          content-filepath: output/report.md
          labels: |
            github-daily
            github-discovery
          assignees: ${{ github.actor }}
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
